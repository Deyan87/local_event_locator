<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sagre in Friuli Venezia Giulia e Veneto Orientale 2026</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  :root {
    --bg: #faf7f2;
    --panel: #ffffff;
    --text: #2b2620;
    --muted: #756e63;
    --accent: #b5432a;
    --accent-soft: #f1ded6;
    --accent2: #3a5a7a;
    --accent2-soft: #dbe4ec;
    --border: #e7ded2;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  header {
    padding: 1.5rem 1.5rem 1rem;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
  }
  header h1 {
    margin: 0 0 0.25rem;
    font-size: 1.5rem;
  }
  header p {
    margin: 0;
    color: var(--muted);
    font-size: 0.9rem;
  }
  header a {
    color: var(--accent);
  }
  .layout {
    display: grid;
    grid-template-columns: minmax(280px, 380px) 1fr;
    height: calc(100vh - 84px);
  }
  @media (max-width: 800px) {
    .layout { grid-template-columns: 1fr; height: auto; }
    #map { height: 60vh; }
  }
  #list {
    overflow-y: auto;
    background: var(--panel);
    border-right: 1px solid var(--border);
    padding: 0.5rem;
  }
  .event-card {
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.75rem 0.9rem;
    margin-bottom: 0.6rem;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  .event-card:hover, .event-card.active {
    background: var(--accent-soft);
    border-color: var(--accent);
  }
  .event-card h3 {
    margin: 0 0 0.3rem;
    font-size: 0.98rem;
  }
  .event-card .meta {
    font-size: 0.83rem;
    color: var(--muted);
    line-height: 1.4;
  }
  .badge {
    display: inline-block;
    background: var(--accent);
    color: white;
    font-size: 0.72rem;
    padding: 0.1rem 0.45rem;
    border-radius: 999px;
    margin-right: 0.3rem;
  }
  .badge.rievocazione {
    background: var(--accent2);
  }
  .type-tag {
    display: inline-block;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    color: var(--muted);
    margin-bottom: 0.3rem;
  }
  .filters {
    display: flex;
    gap: 0.4rem;
    padding: 0.6rem 0.5rem 0.3rem;
  }
  .filter-btn {
    flex: 1;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--text);
    border-radius: 8px;
    padding: 0.4rem 0.3rem;
    font-size: 0.8rem;
    cursor: pointer;
  }
  .filter-btn.active {
    background: var(--text);
    color: white;
    border-color: var(--text);
  }
  .date-filter {
    padding: 0.4rem 0.5rem 0.2rem;
  }
  .date-filter label {
    font-size: 0.78rem;
    color: var(--muted);
    display: block;
    margin-bottom: 0.25rem;
  }
  .date-filter-row {
    display: flex;
    gap: 0.4rem;
  }
  .date-filter-row input[type="date"] {
    flex: 1;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.35rem 0.5rem;
    font-size: 0.85rem;
    background: var(--panel);
    color: var(--text);
  }
  .small-btn {
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--muted);
    border-radius: 8px;
    padding: 0.35rem 0.6rem;
    cursor: pointer;
    font-size: 0.9rem;
    line-height: 1;
  }
  .small-btn:hover {
    color: var(--accent);
    border-color: var(--accent);
  }
  .past-toggle-row {
    padding: 0.5rem 0.5rem 0.2rem;
  }
  .past-toggle {
    width: 100%;
    border: 1px dashed var(--border);
    background: var(--panel);
    color: var(--muted);
    border-radius: 8px;
    padding: 0.45rem 0.3rem;
    font-size: 0.8rem;
    cursor: pointer;
  }
  .past-toggle.active {
    background: var(--accent2-soft);
    color: var(--accent2);
    border-color: var(--accent2);
    border-style: solid;
  }
  .empty-msg {
    text-align: center;
    color: var(--muted);
    font-size: 0.85rem;
    padding: 1.5rem 1rem;
  }
  .event-card.is-past {
    opacity: 0.65;
  }
  #map { height: 100%; }
  .leaflet-popup-content h3 {
    margin: 0 0 0.3rem;
    font-size: 0.95rem;
  }
  .leaflet-popup-content .meta {
    font-size: 0.82rem;
    color: #555;
  }
  footer {
    padding: 0.6rem 1.5rem;
    font-size: 0.78rem;
    color: var(--muted);
    background: var(--panel);
    border-top: 1px solid var(--border);
  }
</style>
</head>
<body>

<header>

  <p>28 eventi 2026 &middot; fonti: <a href="https://paesiinfesta.com/sagre-in-friuli-venezia-giulia-e-veneto-orientale/" target="_blank" rel="noopener">sagre</a> &middot; <a href="https://paesiinfesta.com/rievocazioni-storiche/" target="_blank" rel="noopener">rievocazioni storiche</a> (paesiinfesta.com)</p>
</header>

<div class="layout">
  <div id="list">
    <div class="filters">
      <button class="filter-btn active" data-filter="tutti">Tutti (28)</button>
      <button class="filter-btn" data-filter="sagra">Sagre (22)</button>
      <button class="filter-btn" data-filter="rievocazione">Rievocazioni (6)</button>
    </div>
    <div class="date-filter">
      <label for="dateInput">Eventi in programma il:</label>
      <div class="date-filter-row">
        <input type="date" id="dateInput">
        <button id="dateReset" class="small-btn" title="Rimuovi filtro data">&times;</button>
      </div>
    </div>
    <div class="past-toggle-row">
      <button id="pastToggle" class="past-toggle">Mostra eventi passati</button>
    </div>
    <div id="emptyMsg" class="empty-msg" style="display:none;">Nessun evento trovato.</div>
    <div id="cards"></div>
  </div>
  <div id="map"></div>
</div>

<footer>Mappa realizzata con Leaflet &amp; OpenStreetMap. Coordinate approssimative delle localit&agrave;.</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  {"nome": "49ª ed. Festa in Piassa", "luogo": "Villanova di Pordenone", "provincia": "Pordenone (FVG)", "data": "20 - 31 agosto 2026", "inizio": "2026-08-20", "fine": "2026-08-31", "lat": 45.9332388, "lon": 12.6751644, "tipo": "sagra"},
  {"nome": "44ª Sagra di Sant'Agostino", "luogo": "Torre di Pordenone", "provincia": "Pordenone (FVG)", "data": "21 - 31 agosto 2026", "inizio": "2026-08-21", "fine": "2026-08-31", "lat": 45.9688467, "lon": 12.6792214, "tipo": "sagra"},

  {"nome": "Festeggiamenti Settembrini", "luogo": "Fontanafredda", "provincia": "Pordenone (FVG)", "data": "27 agosto - 6 settembre 2026", "inizio": "2026-08-27", "fine": "2026-09-06", "lat": 45.9733967, "lon": 12.5691228, "tipo": "sagra"},

  {"nome": "Rievocazione storica della Macia", "luogo": "Spilimbergo", "provincia": "Pordenone (FVG)", "data": "14-15-16 agosto 2026", "inizio": "2026-08-14", "fine": "2026-08-16", "lat": 46.1113355, "lon": 12.9016287, "tipo": "rievocazione"},
  {"nome": "Cordovado Medievale", "luogo": "Cordovado", "provincia": "Pordenone (FVG)", "data": "29-30 agosto 2026", "inizio": "2026-08-29", "fine": "2026-08-30", "lat": 45.8457769, "lon": 12.8806648, "tipo": "rievocazione"},
  {"nome": "Medioevo a Valvasone", "luogo": "Valvasone", "provincia": "Pordenone (FVG)", "data": "3-4-5-6 settembre 2026", "inizio": "2026-09-03", "fine": "2026-09-06", "lat": 45.9961488, "lon": 12.8643951, "tipo": "rievocazione"},
  {"nome": "La Giostra dei Castelli", "luogo": "Torre di Pordenone", "provincia": "Pordenone (FVG)", "data": "19-20 settembre 2026", "inizio": "2026-09-19", "fine": "2026-09-20", "lat": 45.9688467, "lon": 12.6792214, "tipo": "rievocazione"}
];

const map = L.map('map').setView([45.95, 12.75], 10);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 18,
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
}).addTo(map);

const cardsEl = document.getElementById('cards');
const colors = { sagra: '#b5432a', rievocazione: '#3a5a7a' };
const typeLabels = { sagra: 'Sagra', rievocazione: 'Rievocazione storica' };

events.forEach((ev) => {
  const marker = L.circleMarker([ev.lat, ev.lon], {
    radius: 9,
    color: '#fff',
    weight: 2,
    fillColor: colors[ev.tipo],
    fillOpacity: 0.9
  }).addTo(map);
  marker.bindPopup(
    `<div class="type-tag">${typeLabels[ev.tipo]}</div><h3>${ev.nome}</h3><div class="meta">${ev.luogo} &mdash; ${ev.provincia}<br><strong>${ev.data}</strong></div>`
  );
  ev._marker = marker;

  const card = document.createElement('div');
  card.className = 'event-card';
  card.dataset.tipo = ev.tipo;
  card.innerHTML = `
    <div class="type-tag">${typeLabels[ev.tipo]}</div>
    <h3>${ev.nome}</h3>
    <div class="meta">
      <span class="badge ${ev.tipo}">${ev.data}</span><br>
      ${ev.luogo} &mdash; ${ev.provincia}
    </div>
  `;
  card.addEventListener('click', () => {
    map.setView([ev.lat, ev.lon], 13, { animate: true });
    marker.openPopup();
    document.querySelectorAll('.event-card').forEach(c => c.classList.remove('active'));
    card.classList.add('active');
  });
  cardsEl.appendChild(card);
  ev._card = card;

  marker.on('click', () => {
    document.querySelectorAll('.event-card').forEach(c => c.classList.remove('active'));
    card.classList.add('active');
    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
  });
});

const todayISO = new Date().toISOString().slice(0, 10);
const dateInput = document.getElementById('dateInput');
const dateReset = document.getElementById('dateReset');
const pastToggle = document.getElementById('pastToggle');
const emptyMsg = document.getElementById('emptyMsg');

let currentTipo = 'tutti';
let showPast = false;

function applyFilters() {
  const selectedDate = dateInput.value;
  let visibleCount = 0;

  events.forEach(ev => {
    let show = true;
    if (currentTipo !== 'tutti' && ev.tipo !== currentTipo) show = false;

    if (selectedDate) {
      if (!(selectedDate >= ev.inizio && selectedDate <= ev.fine)) show = false;
    } else if (!showPast) {
      if (ev.fine < todayISO) show = false;
    }

    ev._card.style.display = show ? '' : 'none';
    ev._card.classList.toggle('is-past', ev.fine < todayISO);
    if (show) {
      ev._marker.addTo(map);
      visibleCount++;
    } else {
      map.removeLayer(ev._marker);
    }
  });

  emptyMsg.style.display = visibleCount === 0 ? '' : 'none';
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTipo = btn.dataset.filter;
    applyFilters();
  });
});

pastToggle.addEventListener('click', () => {
  showPast = !showPast;
  pastToggle.classList.toggle('active', showPast);
  pastToggle.textContent = showPast ? 'Nascondi eventi passati' : 'Mostra eventi passati';
  applyFilters();
});

dateInput.addEventListener('change', applyFilters);
dateReset.addEventListener('click', () => {
  dateInput.value = '';
  applyFilters();
});

applyFilters();
</script>

</body>
</html>
